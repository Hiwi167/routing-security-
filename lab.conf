# as65001 (the BGP router in AS 65001)
#as65001[image]=alpine:latest
as65001[image]=quay.io/openbgpd/openbgpd:latest
as65001[shell]=/bin/ash
as65001[0]=net_as1_as2
as65001[1]=net_as1_as3
as65001[2]=net_as1_as10
as65001[3]=net_as1_as4
as65001[4]=NET_IXP
as65001[5]=net_rpki
as65001[startup]=as65001.startup
as65001[bridged]=true
as65001[privileged]=true
as65001[entrypoint]="sleep infinity"
#as65001[mount]=configs/as65001.conf:/etc/bgpd/bgpd.conf
#net-ixp is ashared layer-2 network so all connected to this are in the same subnet
#all member share common peering LAN

# as65002
as65002[image]=quay.io/openbgpd/openbgpd:latest
as65002[shell]=/bin/ash
