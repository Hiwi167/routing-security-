# as65099 (malicious attacker)
as65099[image]=quay.io/openbgpd/openbgpd:latest
as65099[shell]=/bin/ash
as65099[0]=net_as4_as99
as65099[startup]=as65099.startup
as65099[entrypoint]="sleep infinity"
as65099[1]=net_as99_as2
as65099[2]=net_rpki

# as65004 (additional transit)
as65004[image]=quay.io/openbgpd/openbgpd:latest
as65004[shell]=/bin/ash
as65004[0]=net_as1_as4
as65004[1]=net_as4_as99
as65004[2]=net_rpki
as65004[startup]=as65004.startup
as65004[entrypoint]="sleep infinity"
as65004[shared]=1
# IXP route server (as65000)
as65000[image]=quay.io/openbgpd/openbgpd:latest
as65000[shell]=/bin/ash
as65000[0]=NET_IXP
as65000[1]=net_rpki
as65000[startup]=as65000.startup
as65000[entrypoint]="sleep infinity"
as65000[shared]=1

# as65005 (extra at IXP)
as65005[image]=quay.io/openbgpd/openbgpd:latest
as65005[shell]=/bin/ash
as65005[0]=NET_IXP
as65005[startup]=as65005.startup
as65005[entrypoint]="sleep infinity"

